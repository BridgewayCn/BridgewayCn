  <body>
    <div id="root"></div>
    <script>
      // Remove Kimi Agent watermark
      (function() {
        function removeKimiAgent() {
          var els = document.querySelectorAll('a[href*="kimi.com/agent"], .kimi-agent-badge, [class*="kimi-agent"], [id*="kimi-agent"]');
          els.forEach(function(el) { if(el.parentNode) el.parentNode.removeChild(el); });
        }
        removeKimiAgent();
        setInterval(removeKimiAgent, 500);
        document.addEventListener('DOMContentLoaded', removeKimiAgent);
        window.addEventListener('load', removeKimiAgent);
      })();
    </script>
  </body>
